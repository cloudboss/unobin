<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>unobin run</title>
<link rel="icon" type="image/svg+xml" href="assets/unobin.svg">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header id="banner">
  <div id="title">connecting...</div>
  <div id="status"></div>
</header>
<main>
  <div id="graph-pane">
    <svg id="graph" role="img" aria-label="run graph"></svg>
  </div>
  <aside id="detail" hidden>
    <button id="detail-close" type="button">close</button>
    <h2 id="detail-address"></h2>
    <dl>
      <dt>node kind</dt><dd id="detail-kind"></dd>
      <dt>category</dt><dd id="detail-category"></dd>
      <dt>import alias</dt><dd id="detail-import-alias"></dd>
      <dt>library path</dt><dd id="detail-library-path"></dd>
      <dt>kind</dt><dd id="detail-export-kind"></dd>
      <dt>name</dt><dd id="detail-name"></dd>
      <dt>parent</dt><dd id="detail-parent"></dd>
      <dt>decision</dt><dd id="detail-decision"></dd>
      <dt>state</dt><dd id="detail-state"></dd>
      <dt>elapsed</dt><dd id="detail-elapsed"></dd>
    </dl>
    <pre id="detail-error" hidden></pre>
  </aside>
</main>
<img id="logo" src="assets/unobin.svg" alt="unobin">
<script src="assets/dagre.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
